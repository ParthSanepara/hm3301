name: Release to PyPI

"on":
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.0.2). Must match pyproject.toml."
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate input format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in format vX.Y.Z (got '${{ inputs.version }}')"
            exit 1
          fi

      - name: Verify version matches pyproject.toml
        id: check
        run: |
          INPUT="${{ inputs.version }}"
          INPUT_STRIPPED="${INPUT#v}"
          PYPROJECT_VERSION=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)
          echo "Input version:  $INPUT_STRIPPED"
          echo "pyproject.toml: $PYPROJECT_VERSION"
          if [ "$INPUT_STRIPPED" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Version mismatch: input=$INPUT_STRIPPED, pyproject.toml=$PYPROJECT_VERSION"
            exit 1
          fi
          echo "version=$INPUT_STRIPPED" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ inputs.version }} already exists"
            exit 1
          fi

  test:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  draft-release:
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --draft \
            --title "${{ inputs.version }}" \
            --generate-notes \
            dist/*

  publish-pypi:
    needs: [verify, draft-release]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest
